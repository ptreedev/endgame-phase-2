{% extends "layout.html" %}

{% block title %}Home Page{% endblock %}

{% block content %}
    <h1>Welcome, {{ user.name }}!</h1>
    <h2>Your Coins:</h2>
    {% for coin in coins %}
        <div class="coin">
            <h3>{{ coin.name }}</h3>
            <p>{{ coin.description }}</p>
            <label>
                <input 
                    type="checkbox" 
                    data-coin-id="{{ coin.id }}"
                    data-status-id="status-{{ coin.id }}"
                    {% if coin.complete %}checked{% endif %}
                    onchange="handleToggle(this)"
                />
                Complete
            </label>
            <p  id="status-{{ coin.id }}" class ="status-message"></p>
        </div>
    {% endfor %}
{% endblock %}

{% block scripts %}
<script>
    const API_URL = "{{ api_url }}";
    async function handleToggle(checkbox) {
    const coinId = checkbox.dataset.coinId;
    const complete = checkbox.checked;
    const statusId = checkbox.dataset.statusId;
    const statusEl = document.getElementById(statusId);

    try {
        const response = await fetch(`${API_URL}/coin/${coinId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ complete })
        });

        if (!response.ok) throw new Error('Request failed');

        const updated = await response.json();
        statusEl.textContent = `Saved! Complete: ${updated.complete}`;
    } catch (err) {
        if (statusEl) statusEl.textContent = 'Error saving — reverting.';
        checkbox.checked = !complete;
    }
}
</script>
{% endblock %}
